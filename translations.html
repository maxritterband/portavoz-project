<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translations · The Portavoz Project</title>
  <link rel="icon" type="image/svg+xml" href="images/portavoz-project-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-top: 68px; }

    .page-header {
      padding: 60px 0 48px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .page-header p {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: var(--text-mid);
      max-width: 520px;
      line-height: 1.7;
    }

    .archive-body { padding: 36px 0 96px; }

    .archive-controls {
      padding: 0 0 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-wrap { max-width: 560px; width: 100%; }

    .archive-count {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-light);
      white-space: nowrap;
    }

    .archive-count strong { color: var(--text-dark); }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--text-light);
      font-size: 17px;
    }

    /* ── Card overrides: ensure text wraps inside cards ── */
    .card {
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .card-title {
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .card-original {
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .card-meta-value {
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
      overflow: visible;
      text-overflow: unset;
    }

    /* left accent bar on hover — color set per status in JS */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
    }

    .card.status-published::before { background: var(--green); }
    .card.status-in-progress::before { background: var(--blue); }
    .card.status-other::before { background: var(--navy); }

    .card:hover::before { transform: scaleY(1); }

    /* Status banner — no emoji */
    .card-status-banner {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      color: var(--white);
    }

    .card-status-banner.published  { background: var(--green); }
    .card-status-banner.in-progress { background: var(--blue); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav navy" id="mainNav">
    <a href="index.html" class="nav-brand">
      <div class="nav-logo"><img src="images/portavoz-nav-logo.svg" alt="The Portavoz Project" /></div>
      <span class="nav-name">The Portavoz Project</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="translations.html" class="active">Translations</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <!-- MOBILE DROPDOWN -->
  <div class="nav-dropdown" id="navDropdown">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="translations.html" class="active">Translations</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <div class="container">
      <h1>Translations</h1>
      <p>Published works and translations in progress from the Portavoz collective at the University of Virginia.</p>
    </div>
  </header>

  <!-- BODY -->
  <main class="archive-body">
    <div class="container">
      <div class="archive-controls">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="search-input"
            placeholder="Search by title, author, or translator..."
            id="searchInput" autocomplete="off" />
        </div>
        <p class="archive-count" id="archiveCount"></p>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 The Portavoz Project · University of Virginia</p>
  </footer>

  <script src="js/portavoz-data.js"></script>
  <script>
    let allTranslations = [];

    function statusInfo(status) {
      const s = (status || '').toLowerCase().replace(/\s/g, '-');
      if (s === 'published')   return { label: 'Published',      cls: 'published',   cardCls: 'status-published' };
      if (s === 'in-progress') return { label: 'In Progress',    cls: 'in-progress', cardCls: 'status-in-progress' };
      return null;
    }

    function renderCards(list) {
      const grid  = document.getElementById('cardsGrid');
      const count = document.getElementById('archiveCount');
      grid.innerHTML = '';
      count.innerHTML = `Showing <strong>${list.length}</strong> translation${list.length !== 1 ? 's' : ''}`;

      if (list.length === 0) {
        grid.innerHTML = '<p class="no-results">No translations match your search.</p>';
        return;
      }

      list.forEach(t => {
        const card = document.createElement('a');
        card.href = `translation.html?id=${t.id}`;
        const si = statusInfo(t.status);
        card.className = 'card' + (si ? ' ' + si.cardCls : ' status-other');

        const banner = si
          ? `<div class="card-status-banner ${si.cls}">${si.label}</div>`
          : '';

        const datePublishedRow = t.datePublished
          ? `<div class="card-meta-item">
               <span class="card-meta-label">Date Published</span>
               <span class="card-meta-value">${t.datePublished}</span>
             </div>`
          : '';

        const publisherBlock = t.publisher
          ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
               <span class="card-meta-label">Publisher</span>
               <div class="card-meta-value" style="margin-top:3px;">${t.publisher}</div>
             </div>`
          : '';

        card.innerHTML = `
          ${banner}
          <div class="card-body">
            <h3 class="card-title">${t.title}</h3>
            ${t.originalTitle ? `<p class="card-original">Orig. "${t.originalTitle}" by ${t.author}</p>` : `<p class="card-original">by ${t.author}</p>`}
            <div class="card-divider"></div>
            ${t.datePublished
              ? `<div class="card-meta">
                   <div class="card-meta-item">
                     <span class="card-meta-label">Translator</span>
                     <div class="card-meta-value" style="margin-top:3px;white-space:normal;overflow-wrap:break-word;">${t.translator}${t.translatorClass ? ` (Class of ${t.translatorClass})` : ''}</div>
                   </div>
                   <div class="card-meta-item">
                     <span class="card-meta-label">Date Published</span>
                     <div class="card-meta-value" style="margin-top:3px;">${t.datePublished}</div>
                   </div>
                 </div>`
              : `<div>
                   <span class="card-meta-label">Translator</span>
                   <div class="card-meta-value" style="margin-top:3px;white-space:normal;overflow-wrap:break-word;">${t.translator}${t.translatorClass ? ` (Class of ${t.translatorClass})` : ''}</div>
                 </div>`
            }
            ${publisherBlock}
          </div>
          <div class="card-footer">
            ${si && si.cls === 'published' ? 'Read excerpt' : 'View details'} <span class="card-footer-arrow">→</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) { renderCards(allTranslations); return; }
      renderCards(allTranslations.filter(t =>
        t.title.toLowerCase().includes(q) ||
        (t.originalTitle || '').toLowerCase().includes(q) ||
        t.author.toLowerCase().includes(q) ||
        t.translator.toLowerCase().includes(q) ||
        (t.publisher || '').toLowerCase().includes(q)
      ));
    });

    function sortTranslations(list) {
      return [...list].sort((a, b) => {
        const statusOrder = s => {
          const v = (s || '').toLowerCase().replace(/\s/g, '-');
          if (v === 'published')   return 0;
          if (v === 'in-progress') return 1;
          return 2;
        };
        // First sort by status group
        const sg = statusOrder(a.status) - statusOrder(b.status);
        if (sg !== 0) return sg;
        // Within published: sort by datePublished descending
        const da = parseInt(a.datePublished) || 0;
        const db = parseInt(b.datePublished) || 0;
        return db - da;
      });
    }

    async function init() {
      const raw = await loadTranslations();
      allTranslations = sortTranslations(raw);
      renderCards(allTranslations);
    }

    init();
  </script>
  <script>
    (function() {
      var btn = document.getElementById('navHamburger');
      var dd  = document.getElementById('navDropdown');
      if (!btn || !dd) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dd.classList.toggle('open');
        btn.classList.toggle('open', open);
      });
      document.addEventListener('click', function(e) {
        if (!btn.contains(e.target) && !dd.contains(e.target)) {
          dd.classList.remove('open');
          btn.classList.remove('open');
        }
      });
      var page = window.location.pathname.split('/').pop() || 'index.html';
      dd.querySelectorAll('a').forEach(function(a) {
        if (a.getAttribute('href') === page) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
