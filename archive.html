<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation Archive · The Portavoz Project</title>
  <link rel="icon" type="image/svg+xml" href="images/portavoz-project-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-top: 68px; }

    .page-header {
      padding: 60px 0 48px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .page-header p {
      font-family: 'Lora', serif;
      font-size: 16px;
      color: var(--text-mid);
      max-width: 520px;
      line-height: 1.7;
    }

    .archive-controls {
      padding: 36px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .archive-count {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-light);
    }

    .archive-count strong {
      color: var(--text-dark);
    }

    .archive-body {
      padding: 36px 0 96px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--text-light);
      font-size: 17px;
    }

    /* card hover highlight effect */
    .card {
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(224,120,32,0.04), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .card:hover::after {
      opacity: 1;
    }

    /* card hover: left orange accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--orange);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
    }

    .card:hover::before {
      transform: scaleY(1);
    }

    @media (max-width: 768px) {
      .archive-controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav scrolled" id="mainNav">
    <a href="index.html" class="nav-brand">
      <div class="nav-logo"><img src="images/portavoz-project-logo.svg" alt="The Portavoz Project" /></div>
      <span class="nav-name">The Portavoz Project</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About the Project</a></li>
      <li><a href="recent.html">Recent Translations</a></li>
      <li><a href="archive.html" class="active">All Translations</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <div class="container">
      <h1>Translation Archive</h1>
      <p>Explore the complete collection of literary translations produced by University of Virginia students.</p>
    </div>
  </header>

  <!-- ARCHIVE BODY -->
  <main class="archive-body">
    <div class="container">
      <div class="archive-controls">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search by title, author, or translator..."
            id="searchInput"
            autocomplete="off"
          />
        </div>
        <p class="archive-count" id="archiveCount"></p>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 The Portavoz Project · University of Virginia</p>
  </footer>

  <script>
    // Scrolled nav on this page always (no hero)
    const nav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', true);
    });

    let allTranslations = [];

    function renderCards(list) {
      const grid = document.getElementById('cardsGrid');
      const count = document.getElementById('archiveCount');
      grid.innerHTML = '';

      count.innerHTML = `Showing <strong>${list.length}</strong> translation${list.length !== 1 ? 's' : ''}`;

      if (list.length === 0) {
        grid.innerHTML = '<p class="no-results">No translations match your search.</p>';
        return;
      }

      list.forEach(t => {
        const card = document.createElement('a');
        card.href = `translation.html?id=${t.id}`;
        card.className = 'card';

        const featuredBanner = t.featured
          ? `<div class="card-featured-banner">⭐ Featured Translation</div>`
          : '';

        card.innerHTML = `
          ${featuredBanner}
          <div class="card-body">
            <h3 class="card-title">${t.title}</h3>
            <p class="card-original">Orig. "${t.originalTitle}" by ${t.author}</p>
            <div class="card-divider"></div>
            <div class="card-meta">
              <div class="card-meta-item">
                <span class="card-meta-label">👤 Translator</span>
                <span class="card-meta-value">${t.translator} (Class of ${t.translatorClass})</span>
              </div>
              <div class="card-meta-item">
                <span class="card-meta-label">📄 Length</span>
                <span class="card-meta-value">${t.readTime}</span>
              </div>
            </div>
          </div>
          <div class="card-footer">
            Read translation <span class="card-footer-arrow">→</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterTranslations(query) {
      const q = query.toLowerCase().trim();
      if (!q) return allTranslations;
      return allTranslations.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.originalTitle.toLowerCase().includes(q) ||
        t.author.toLowerCase().includes(q) ||
        t.translator.toLowerCase().includes(q)
      );
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderCards(filterTranslations(e.target.value));
    });

    async function init() {
      const res = await fetch('data/translations.json');
      allTranslations = await res.json();
      renderCards(allTranslations);
    }

    init();
  </script>
</body>
</html>
