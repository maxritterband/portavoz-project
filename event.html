<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event · The Portavoz Project</title>
  <link rel="icon" type="image/svg+xml" href="images/portavoz-project-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-top: 68px; background: var(--cream); }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Inter', sans-serif; font-size: 14px;
      color: var(--text-mid); text-decoration: none;
      padding: 28px 0 0; transition: color 0.2s;
    }
    .back-link:hover { color: var(--navy); }

    /* ── LAYOUT ── */
    .event-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
      padding: 36px 0 24px;
      align-items: start;
    }

    /* ── MAIN COLUMN ── */
    .event-main {}

    .event-label {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--blue); margin-bottom: 12px;
    }

    .event-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 4.5vw, 60px);
      font-weight: 700; color: var(--navy);
      line-height: 1.1; margin-bottom: 10px;
    }

    .event-subtitle {
      font-family: 'Libre Baskerville', serif; font-style: italic;
      font-size: 16px; color: var(--text-mid);
      line-height: 1.6; margin-bottom: 28px;
    }

    /* ticket buttons area */
    .event-tickets {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-bottom: 32px;
    }

    .event-divider {
      height: 1px; background: var(--border);
      margin: 32px 0;
    }

    .event-description {
      font-family: 'Libre Baskerville', serif; font-size: 16px;
      color: var(--text-mid); line-height: 1.85;
      margin-bottom: 32px;
    }

    /* poster */
    .event-poster {
      margin-bottom: 32px; text-align: center;
    }
    .event-poster img {
      max-width: 440px; width: 100%; height: auto;
      border-radius: 10px; box-shadow: 0 4px 28px rgba(8,52,91,0.15);
    }

    /* schedule */
    .event-schedule-title {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 12px;
    }

    .event-schedule-item {
      display: flex; gap: 20px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .event-schedule-item:last-child { border-bottom: none; }

    .schedule-date {
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--navy); min-width: 130px; flex-shrink: 0;
    }
    .schedule-detail {
      font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-mid);
    }

    /* sponsors */
    .event-sponsors {
      margin-top: 32px; padding-top: 20px; padding-bottom: 48px;
      border-top: 1px solid var(--border);
    }
    .event-sponsors-label {
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 8px;
    }
    .event-sponsors-list {
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--text-mid); line-height: 1.9;
    }

    /* ── SIDEBAR ── */
    .event-sidebar { position: sticky; top: 88px; }

    .sidebar-card {
      background: var(--white); border-radius: 12px;
      box-shadow: var(--card-shadow); overflow: hidden;
      margin-bottom: 20px;
    }

    .sidebar-card-header {
      background: var(--navy); padding: 16px 20px;
    }
    .sidebar-card-header-title {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .sidebar-card-body { padding: 18px 20px; }

    .sidebar-field { margin-bottom: 16px; }
    .sidebar-field:last-child { margin-bottom: 0; }

    .sidebar-field-label {
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 3px;
    }
    .sidebar-field-value {
      font-family: 'Inter', sans-serif; font-size: 14px;
      font-weight: 500; color: var(--text-dark);
      word-wrap: break-word;
    }

    .sidebar-poster img {
      width: 100%; height: auto; display: block;
      cursor: zoom-in; transition: opacity 0.2s;
    }
    .sidebar-poster img:hover { opacity: 0.88; }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(8,52,91,0.92);
      align-items: center; justify-content: center;
      padding: 24px;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw; max-height: 90vh;
      width: auto; height: auto;
      border-radius: 8px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.5);
      cursor: default;
    }

    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300;
      color: rgba(255,255,255,0.8); cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: white; }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .event-layout {
        grid-template-columns: 1fr;
      }
      .event-sidebar {
        position: static;
        order: -1; /* sidebar poster appears above content on mobile */
      }
      .sidebar-card:not(.sidebar-poster-card) {
        display: none; /* hide detail card on mobile, info is in main column */
      }
    }

    /* loading / error */
    .event-loading {
      font-family: 'Libre Baskerville', serif; font-style: italic;
      color: var(--text-light); font-size: 16px; padding: 60px 0;
      text-align: center;
    }

    /* FEATURED ARTISTS */
    .artists-section {
      margin-top: 16px;
      margin-bottom: 0;
      padding-bottom: 8px;
    }
    .artists-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 32px;
    }
    .artists-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }
    .artist-card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .artist-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--card-shadow-hover);
    }
    .artist-card img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }
    .artist-banner {
      padding: 20px 22px;
      background: var(--white);
    }
    .artist-banner .artist-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .artist-banner .artist-role {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .artist-banner .artist-cta {
      font-family: 'Libre Baskerville', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease;
    }
    .artist-banner .artist-cta .cta-arrow {
      font-style: normal;
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .artist-card:hover .artist-banner .artist-cta {
      color: var(--navy);
    }
    .artist-card:hover .artist-banner .artist-cta .cta-arrow {
      transform: translateX(4px);
    }

    /* ARTIST LIGHTBOX */
    .artist-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,52,91,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .artist-lightbox.open { display: flex; }
    .artist-lightbox-card {
      position: relative;
      background: var(--navy);
      border-radius: 14px;
      padding: 0;
      max-width: 520px;
      width: 92%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
      animation: artistZoomIn 0.3s cubic-bezier(0.4,0,0.2,1);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    @keyframes artistZoomIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .artist-lightbox-card::-webkit-scrollbar { width: 4px; }
    .artist-lightbox-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .artist-lightbox-card .alb-photo {
      width: 130px;
      height: 130px;
      object-fit: cover;
      object-position: center 15%;
      display: block;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.2);
      margin: 36px auto 0;
    }
    .artist-lightbox-body {
      padding: 28px 32px 36px;
    }
    .artist-lightbox-card .alb-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .artist-lightbox-card .alb-role {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    .artist-lightbox-card .alb-divider {
      width: 40px; height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 20px;
    }
    .artist-lightbox-card .alb-desc {
      font-family: 'Libre Baskerville', serif;
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      line-height: 1.85;
      text-align: left;
    }
    .artist-lb-close {
      position: absolute;
      top: 14px; right: 18px;
      background: rgba(0,0,0,0.4);
      border: none;
      color: var(--white);
      font-size: 26px;
      cursor: pointer;
      opacity: 0.8;
      line-height: 1;
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
    }
    .artist-lb-close:hover { opacity: 1; background: rgba(0,0,0,0.6); }

    @media (max-width: 720px) {
      .artists-grid { grid-template-columns: 1fr; }
      .artist-card img { height: 220px; }
    }
  </style>
</head>
<body>

  <nav class="nav navy" id="mainNav">
    <a href="/" class="nav-brand">
      <div class="nav-logo"><img src="images/portavoz-nav-logo.svg" alt="The Portavoz Project" /></div>
      <span class="nav-name">The Portavoz Project</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/translations">Translations</a></li>
      <li><a href="/events" class="active">Events</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-separator" id="navSeparator"></div>
  <div class="nav-dropdown" id="navDropdown">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/translations">Translations</a>
    <a href="/events" class="active">Events</a>
    <a href="/contact">Contact</a>
  </div>

  <div class="lightbox" id="posterLightbox">
    <span class="lightbox-close" id="lightboxClose">×</span>
    <img id="lightboxImg" src="" alt="Event poster" />
  </div>

  <main>
    <div class="container">
      <a href="/events" class="back-link">← Back to Events</a>
      <div id="eventContent">
        <p class="event-loading">Loading event…</p>
      </div>
    </div>
  </main>

  <!-- Artist lightbox -->
  <div class="artist-lightbox" id="artistLightbox">
    <div class="artist-lightbox-card" id="artistLightboxCard">
      <button class="artist-lb-close" id="artistLbClose" aria-label="Close">&#215;</button>
      <img class="alb-photo" id="albPhoto" src="" alt="" />
      <div class="artist-lightbox-body">
        <div class="alb-name" id="albName"></div>
        <div class="alb-role" id="albRole"></div>
        <div class="alb-divider"></div>
        <div class="alb-desc" id="albDesc"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 The Portavoz Project · Website designed by Max Ritterband</p>
  </footer>

  <script src="js/portavoz-data.js"></script>
  <script>
    const SEED_EVENTS = [
      {
        id:          'entre-voces-y-escenas',
        title:       'Theatre, Translation, and Global Exchange: A Multi-Day Learning Laboratory at UVA',
        subtitle:    'A residency with Argentine playwright Rubén Mosquera · with Sol Leone and Milagros Mongia',
        label:       'UVA Residency · April 6–12, 2026',
        description: 'Join us for a multi-day residency with acclaimed Argentine playwright and theatre director Rubén Mosquera, hosted by the Department of Spanish, Italian & Portuguese at the University of Virginia. A leading figure in Argentina\'s independent theatre scene, Mosquera is known for socially engaged works that explore historical memory, civic responsibility, and the role of performance in times of political and cultural change. His theatre blends sharp social critique with innovative dramaturgy, positioning the stage as a space for dialogue, reflection, and collective meaning-making.\n\nStudents are invited to a series of events including an informal conversation with Mosquera and visiting actresses Sol Leone and Milagros Mongia at Casa Bolívar on Wednesday April 8th and a Spanish-language lecture on Theatre as Social Critique in Argentina on Thursday, April 9th.\n\nThe residency will culminate in free public performances of Entre Voces y Escenas, a new play written specifically for this residency, with UVA students working on its English translation. Performances will take place in the Caplin Theater, followed by a bilingual, student-moderated dialogue with the artists.',
        startDate:   '2026-04-06',
        endDate:     '2026-04-12',
        posterURL:   'images/entre-voces-poster.jpg',
        ticketLinks: [
          { label: 'Reserve Tickets — Apr 10 · 7:00 PM', url: 'https://tickets.artsboxoffice.virginia.edu/11024/11025' },
          { label: 'Reserve Tickets — Apr 11 · 2:00 PM', url: 'https://tickets.artsboxoffice.virginia.edu/11024/11026' },
        ],
        schedule:    'Mon Apr 6 · 1–2 PM|Conversaciones y Cafecito with Sol Leone & Milagros Mongia, hosted by Francis Whitfill — NCH 448||Wed Apr 8 · 4 PM|Cultural Conversation with Rubén Mosquera, Sol Leone & Milagros Mongia — Casa Bolívar||Thu Apr 9 · 5–6:30 PM|Lecture: "El Teatro como crítica social en Argentina" with Q&A — Clark Hall 108||Fri Apr 10 · 7–9 PM|World Premiere: "Entre voces y escenas" + Bilingual Q&A — Caplin Theater, Culbreth Hall||Sat Apr 11 · 2–4 PM|Performance: "Entre voces y escenas" + Bilingual Q&A — Caplin Theater, Culbreth Hall',
        sponsors:    'GEO Fellowship|The Jefferson Trust|Dept. of Spanish, Italian & Portuguese|Sigma Delta Pi|Casa Bolívar|The Portavoz Project',
      }
    ];

    function isPast(event) {
      const dateStr = event.endDate || event.startDate;
      if (!dateStr) return false;
      const end = new Date(dateStr);
      end.setHours(23, 59, 59);
      return end < new Date();
    }

    function formatDateRange(start, end) {
      if (!start) return '';
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const s = new Date(start);
      const sm = months[s.getUTCMonth()]; const sd = s.getUTCDate(); const sy = s.getUTCFullYear();
      if (!end || end === start) return `${sm} ${sd}, ${sy}`;
      const e = new Date(end);
      const em = months[e.getUTCMonth()]; const ed = e.getUTCDate(); const ey = e.getUTCFullYear();
      if (sm === em && sy === ey) return `${sm} ${sd}–${ed}, ${sy}`;
      return `${sm} ${sd} – ${em} ${ed}, ${ey}`;
    }

    function buildSchedule(str) {
      if (!str) return '';
      const items = str.split('||').map(s => s.trim()).filter(Boolean);
      if (!items.length) return '';
      const rows = items.map(item => {
        const [date, detail] = item.split('|').map(s => s.trim());
        return `<div class="event-schedule-item">
          <span class="schedule-date">${date || ''}</span>
          <span class="schedule-detail">${detail || ''}</span>
        </div>`;
      }).join('');
      return `<p class="event-schedule-title">Schedule of Events</p>${rows}`;
    }

    function buildSponsors(str) {
      if (!str) return '';
      const names = str.split('|').map(s => s.trim()).filter(Boolean);
      if (!names.length) return '';
      return `<div class="event-sponsors">
        <p class="event-sponsors-label">Presented with support from</p>
        <p class="event-sponsors-list">${names.join(' · ')}</p>
      </div>`;
    }

    function buildTickets(event, past) {
      if (past) return '';
      const links = event.ticketLinks && event.ticketLinks.length
        ? event.ticketLinks
        : event.ticketLink ? [{ label: 'Reserve Tickets →', url: event.ticketLink }] : [];
      if (!links.length) return '';
      return links.map(l =>
        `<a href="${l.url}" target="_blank" rel="noopener" class="btn btn-primary" style="white-space:nowrap;">${l.label}</a>`
      ).join('');
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const content = document.getElementById('eventContent');

      const sheetReady = typeof EVENTS_SHEET_GID !== 'undefined'
        && EVENTS_SHEET_GID !== 'REPLACE_WITH_EVENTS_TAB_GID';
      let events = sheetReady ? await loadEvents() : [];
      if (!events.length) events = SEED_EVENTS;

      const event = events.find(e => e.id === id) || events[0];

      if (!event) {
        content.innerHTML = `<p class="event-loading">Event not found. <a href="/events">Back to Events</a></p>`;
        return;
      }

      document.title = `${event.title} · The Portavoz Project`;
      const past = isPast(event);
      const dateStr = formatDateRange(event.startDate, event.endDate);
      const tickets = buildTickets(event, past);

      content.innerHTML = `
        <div class="event-layout">

          <div class="event-main">
            ${event.label ? `<p class="event-label">${event.label}</p>` : ''}
            <h1 class="event-title">${event.title}</h1>
            ${event.subtitle ? `<p class="event-subtitle">${event.subtitle}</p>` : ''}

            ${tickets ? `<div class="event-tickets">${tickets}</div>` : ''}

            <div class="event-divider"></div>

            ${event.description ? event.description.split('\n\n').map(p => `<p class="event-description">${p.trim()}</p>`).join('') : ''}

            ${buildSchedule(event.schedule)}
          </div>

          <aside class="event-sidebar">
            ${event.posterURL ? `
              <div class="sidebar-card sidebar-poster-card">
                <div class="sidebar-poster">
                  <img src="${event.posterURL}" alt="${event.title} poster" id="posterThumb" />
                </div>
              </div>` : ''}

            <div class="sidebar-card">
              <div class="sidebar-card-header">
                <p class="sidebar-card-header-title">Event Details</p>
              </div>
              <div class="sidebar-card-body">
                ${dateStr ? `<div class="sidebar-field">
                  <p class="sidebar-field-label">Date</p>
                  <p class="sidebar-field-value">${dateStr}</p>
                </div>` : ''}
                ${event.label ? `<div class="sidebar-field">
                  <p class="sidebar-field-label">Type</p>
                  <p class="sidebar-field-value">${event.label}</p>
                </div>` : ''}
                ${past ? `<div class="sidebar-field">
                  <p class="sidebar-field-label">Status</p>
                  <p class="sidebar-field-value" style="color:var(--text-light);">Past event</p>
                </div>` : ''}
              </div>
            </div>
          </aside>

        </div>

        <div id="featuredArtistsInner"></div>
        ${buildSponsors(event.sponsors)}`;

      initLightbox();
      initArtists();
    }

    const ARTISTS = {
      griselda: {
        name: 'Griselda Milagros Mongia',
        role: 'Actress',
        photo: 'images/griselda-milagros-mongia.jpg',
        desc: `Griselda Milagros Mongia is 25 years old and holds a Bachelor's degree in Dramatic Arts from the University of El Salvador. She has been involved in theater since the age of 13 and has worked under the direction of Rubén Mosquera in plays such as "Amor y memoria," "Antonomía," and "Doña Petra parió en medio de la calle." She participated in the international festival "Brisk," toured northern Argentina and La Paz (Bolivia) with "The Spark," and has been active for years in the independent theater scene as both an actress and assistant director.`
      },
      ruben: {
        name: 'Rubén Mosquera',
        role: 'Playwright & Director',
        photo: 'images/ruben-mosquera.jpg',
        desc: `Rubén Mosquera is a playwright and director, working in the independent theater circuit of Argentina. In addition to authoring stage plays he contributes to set, light and sound design as well as executive production.\n\nEssentially self-taught, he deeply aligns with the ideas of Pedro Asquini and Juan Carlos Gené in their commitment to the relationship between theater, society, and the historical moment in which it develops. He considers theater a tool for social and political transformation.\n\nHis stage productions are austere, working with minimal budgets, yet without reducing high-level scenography or lighting possibilities—achieving this more through audience imagination.\n\nSince 2009, he has written and staged more than twenty plays in Buenos Aires, in what can be described as the "author's theater," creating independent works that uniquely express his citizen-of-the-21st-century-voice.\n\nAs the creator of his own theatrical universe, he applies—in each particular case—principles of architecture, visual arts, dance, music, literature, song, and other forms of expression to bring his vision to life. These disciplines serve as vehicles for what he wishes to express, while always maintaining connections to references grounded in the reality of the contemporary society in which he lives and develops his work.\n\nHe has staged works in several theaters throughout Buenos Aires and greater Argentina. Additionally, he has presented productions of his works and delivered lectures on his views about theater—particularly independent theater in Buenos Aires—at the following U.S. universities: University of Virginia (UVA), James Madison University (JMU) in Harrisonburg, University of Maryland (UMBC), Morgan State University (MSU), and Towson University in Baltimore.\n\nAmong his main works are: "Las putas de San Julián," "La bella en su jaula," "Amor y memoria," "La sutil debilidad del rey," "Moldeada a imagen y semejanza," "La sombra tras la sonrisa," "Antonomía," and "Doña Petra parió en medio de la calle," among others.`
      },
      sol: {
        name: 'Sol Leone Martens',
        role: 'Actress',
        photo: 'images/sol-leone-martens.jpg',
        desc: `Sol Leone Martens is a 23-year-old actress with a Bachelor's degree in Performing Arts from the Argentine University of Enterprise. With more than five years of experience in theater, she has participated in several productions alongside Rubén Mosquera, including "La guerra de las cuatro batallas," "La bella en su jaula," and "Cartas a ninguna parte." She also took part in a university-level professional production of "La Dama Boba." In addition, she is trained in dance and singing.`
      }
    };

    function initArtists() {
      // Inject artists HTML before sponsors (inside event-main)
      const inner = document.getElementById('featuredArtistsInner');
      if (!inner) return;
      inner.innerHTML = `
        <div class="artists-section">
          <h2>Featured Artists</h2>
          <div class="artists-grid">
            <div class="artist-card" data-artist="ruben">
              <img src="images/ruben-mosquera.jpg" alt="Rubén Mosquera" />
              <div class="artist-banner">
                <div class="artist-name">Rubén Mosquera</div>
                <div class="artist-role">Playwright &amp; Director</div>
                <div class="artist-cta">Click to read more about Rubén Mosquera <span class="cta-arrow">→</span></div>
              </div>
            </div>
            <div class="artist-card" data-artist="griselda">
              <img src="images/griselda-milagros-mongia.jpg" alt="Griselda Milagros Mongia" />
              <div class="artist-banner">
                <div class="artist-name">Griselda Milagros Mongia</div>
                <div class="artist-role">Actress</div>
                <div class="artist-cta">Click to read more about Griselda Milagros Mongia <span class="cta-arrow">→</span></div>
              </div>
            </div>
            <div class="artist-card" data-artist="sol">
              <img src="images/sol-leone-martens.jpg" alt="Sol Leone Martens" />
              <div class="artist-banner">
                <div class="artist-name">Sol Leone Martens</div>
                <div class="artist-role">Actress</div>
                <div class="artist-cta">Click to read more about Sol Leone Martens <span class="cta-arrow">→</span></div>
              </div>
            </div>
          </div>
        </div>`;

      const lb     = document.getElementById('artistLightbox');
      const lbCard = document.getElementById('artistLightboxCard');

      document.querySelectorAll('.artist-card').forEach(card => {
        card.addEventListener('click', () => {
          const a = ARTISTS[card.dataset.artist];
          if (!a) return;

          document.getElementById('albPhoto').src = a.photo;
          document.getElementById('albPhoto').alt = a.name;
          document.getElementById('albName').textContent = a.name;
          document.getElementById('albRole').textContent = a.role;

          // Render paragraphs for multi-paragraph bios
          document.getElementById('albDesc').innerHTML =
            a.desc.split('\n\n').map(p => `<p style="margin-bottom:14px">${p.trim()}</p>`).join('');

          // Re-trigger animation
          lbCard.style.animation = 'none';
          lbCard.offsetHeight;
          lbCard.style.animation = '';

          lb.classList.add('open');
        });
      });

      document.getElementById('artistLbClose').addEventListener('click', () => lb.classList.remove('open'));
      lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
    }

    function initLightbox() {
      const thumb = document.getElementById('posterThumb');
      const lb    = document.getElementById('posterLightbox');
      const lbImg = document.getElementById('lightboxImg');
      const close = document.getElementById('lightboxClose');
      if (!thumb || !lb) return;

      lbImg.src = thumb.src;
      thumb.addEventListener('click', () => lb.classList.add('open'));
      close.addEventListener('click', (e) => { e.stopPropagation(); lb.classList.remove('open'); });
      lb.addEventListener('click', () => lb.classList.remove('open'));
      lbImg.addEventListener('click', (e) => e.stopPropagation());
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lb.classList.remove('open'); });
    }

    init();
  </script>
  <script>
    (function() {
      var btn = document.getElementById('navHamburger');
      var dd  = document.getElementById('navDropdown');
      if (!btn || !dd) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dd.classList.toggle('open');
        btn.classList.toggle('open', open);
      });
      document.addEventListener('click', function(e) {
        if (!btn.contains(e.target) && !dd.contains(e.target)) {
          dd.classList.remove('open');
          btn.classList.remove('open');
        }
      });
      var page = window.location.pathname.replace(/\/+$/, '').split('/').pop() || 'index';
      dd.querySelectorAll('a').forEach(function(a) {
        if (a.getAttribute('href').replace(/^\//,'').replace(/\/$/,'') === page) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
