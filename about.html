<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · The Portavoz Project</title>
  <link rel="icon" type="image/svg+xml" href="images/portavoz-project-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-top: 0; }

    /* HERO STRIP */
    .about-hero {
      background: var(--navy);
      padding: 148px 0 80px;
      text-align: center;
    }

    .about-hero .label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }

    .about-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      max-width: 640px;
      margin: 0 auto 20px;
    }

    .about-hero h1 em {
      font-style: italic;
      color: var(--green);
    }

    .about-hero p {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      color: rgba(255,255,255,0.6);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* CONTENT */
    .about-content {
      padding: 80px 0 100px;
      background: var(--cream);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
      margin-bottom: 80px;
    }

    .about-text h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
      line-height: 1.25;
    }

    .about-text p {
      font-family: 'Libre Baskerville', serif;
      font-size: 16px;
      color: var(--text-mid);
      line-height: 1.85;
      margin-bottom: 16px;
    }

    .about-text p:last-child { margin-bottom: 0; }

    .about-aside {
      background: var(--white);
      border-radius: 10px;
      padding: 36px;
      box-shadow: var(--card-shadow);
      border-top: 4px solid var(--orange);
    }

    .director-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .director-photo-wrap {
      width: 100%;
      height: 220px;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .director-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    .director-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
    }

    .about-aside h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .director-title {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .director-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    .about-aside p {
      font-family: 'Libre Baskerville', serif;
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .about-aside p:last-of-type { margin-bottom: 20px; }

    .director-credentials {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .director-credentials span {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--text-light);
    }

    /* TEAM */
    .team-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .team-section > p {
      font-family: 'Libre Baskerville', serif;
      font-size: 16px;
      color: var(--text-mid);
      margin-bottom: 40px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* ── Team cards ── */
    .team-card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--card-shadow);
      text-align: center;
      padding: 24px 18px;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .team-card.has-detail {
      cursor: pointer;
    }

    .team-card.has-detail:hover {
      transform: translateY(-6px);
      box-shadow: var(--card-shadow-hover);
    }

    .team-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .team-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
      line-height: 1.2;
    }

    .team-role {
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      color: var(--green);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .team-class {
      font-family: 'Libre Baskerville', serif;
      font-size: 12px;
      color: var(--text-light);
      font-style: italic;
    }

    .team-loading {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      color: var(--text-light);
      font-size: 15px;
      padding: 20px 0;
    }

  <!-- Student lightbox -->
  <div class="student-lightbox" id="studentLightbox">
    <button class="lb-close" id="lbCloseBtn" aria-label="Close">&#215;</button>
    <div class="student-lightbox-card">
      <div id="lbPhoto"></div>
      <div class="lb-name" id="lbName"></div>
      <div class="lb-meta" id="lbMeta"></div>
      <div class="lb-desc" id="lbDesc"></div>
    </div>
  </div>

  <style>
    .student-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,52,91,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .student-lightbox.open { display: flex; }
    .student-lightbox-card {
      background: var(--navy);
      border-radius: 14px;
      padding: 40px 36px;
      max-width: 480px;
      width: 92%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      max-height: 88vh;
      overflow-y: auto;
      animation: lbZoomIn 0.3s cubic-bezier(0.4,0,0.2,1);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    @keyframes lbZoomIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .student-lightbox-card::-webkit-scrollbar { width: 4px; }
    .student-lightbox-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .student-lightbox-card #lbPhoto img {
      width: 96px; height: 96px; border-radius: 50%;
      object-fit: cover; border: 3px solid rgba(255,255,255,0.25);
      margin: 0 auto 16px; display: block;
    }
    .student-lightbox-card .lb-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: rgba(255,255,255,0.12); color: var(--white);
      font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .student-lightbox-card .lb-name {
      font-family: 'Cormorant Garamond', serif; font-size: 28px;
      font-weight: 700; color: var(--white); margin-bottom: 4px;
    }
    .student-lightbox-card .lb-meta {
      font-family: 'Inter', sans-serif; font-size: 12px;
      color: rgba(255,255,255,0.5); margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .student-lightbox-card .lb-desc {
      font-family: 'Libre Baskerville', serif; font-size: 14px;
      color: rgba(255,255,255,0.82); line-height: 1.8; text-align: left;
    }
    .lb-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--white);
      font-size: 28px; cursor: pointer; opacity: 0.6; line-height: 1;
    }
    .lb-close:hover { opacity: 1; }
  </style>

  <script src="js/portavoz-data.js"></script>
  <script>
    async function loadTranslators() {
      const grid = document.getElementById('translatorsGrid');
      let all = [];

      // Use loadAllRows if available (includes rows without id/title),
      // otherwise fall back to loadTranslations
      try {
        all = typeof loadAllRows === 'function'
          ? await loadAllRows()
          : await loadTranslations();
      } catch(e) {
        grid.innerHTML = '<p class="team-loading">Could not load translators.</p>';
        return;
      }

      const seen = new Set();
      const students = [];

      all.forEach(row => {
        const names   = (row.studentTranslator || '').split(',').map(s => s.trim()).filter(Boolean);
        const classes = (row.studentClass      || '').split(',').map(s => s.trim());
        const photos  = (row.studentPhoto      || '').split(',').map(s => s.trim());
        const descs   = (row.studentDesc       || '').split('|').map(s => s.trim());

        names.forEach((name, i) => {
          if (!seen.has(name)) {
            seen.add(name);
            students.push({
              name,
              classYear: classes[i] || '',
              photo:     photos[i]  || '',
              desc:      descs[i]   || descs[0] || '',
            });
          }
        });
      });

      if (!students.length) {
        grid.innerHTML = '<p class="team-loading">No student translators yet.</p>';
        return;
      }

      students.sort((a, b) =>
        a.name.split(' ').pop().localeCompare(b.name.split(' ').pop())
      );

      window._students = students;

      grid.innerHTML = students.map((s, idx) => {
        const initial    = s.name.charAt(0).toUpperCase();
        const classLabel = s.classYear ? `Class of ${s.classYear}` : '';
        const clickable  = !!(s.photo || s.desc);
        return `<div class="team-card${clickable ? ' has-detail' : ''}"
                     ${clickable ? `data-idx="${idx}"` : ''}>
          <div class="team-avatar">${initial}</div>
          <div class="team-name">${s.name}</div>
          <div class="team-role">Translator</div>
          ${classLabel ? `<div class="team-class">${classLabel}</div>` : ''}
        </div>`;
      }).join('');

      grid.querySelectorAll('.team-card.has-detail').forEach(card => {
        card.addEventListener('click', () => {
          const s = window._students[+card.dataset.idx];
          const classLabel = s.classYear ? `Translator · Class of ${s.classYear}` : 'Translator';

          document.getElementById('lbPhoto').innerHTML = s.photo
            ? `<img src="${s.photo}" alt="${s.name}">`
            : `<div class="lb-avatar">${s.name.charAt(0)}</div>`;
          document.getElementById('lbName').textContent = s.name;
          document.getElementById('lbMeta').textContent = classLabel;
          document.getElementById('lbDesc').textContent = s.desc;
          document.getElementById('lbDesc').style.display = s.desc ? '' : 'none';

          // Re-trigger zoom animation
          const card2 = document.querySelector('.student-lightbox-card');
          card2.style.animation = 'none';
          card2.offsetHeight;
          card2.style.animation = '';

          document.getElementById('studentLightbox').classList.add('open');
        });
      });
    }

    document.getElementById('lbCloseBtn').addEventListener('click', () =>
      document.getElementById('studentLightbox').classList.remove('open')
    );
    document.getElementById('studentLightbox').addEventListener('click', e => {
      if (e.target.id === 'studentLightbox')
        document.getElementById('studentLightbox').classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape')
        document.getElementById('studentLightbox').classList.remove('open');
    });

    loadTranslators();
  </script>

    <script>
    (function() {
      var btn = document.getElementById('navHamburger');
      var dd  = document.getElementById('navDropdown');
      if (!btn || !dd) return;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dd.classList.toggle('open');
        btn.classList.toggle('open', open);
      });
      document.addEventListener('click', function(e) {
        if (!btn.contains(e.target) && !dd.contains(e.target)) {
          dd.classList.remove('open');
          btn.classList.remove('open');
        }
      });
      var page = window.location.pathname.replace(/\/+$/, '').split('/').pop() || 'index';
      dd.querySelectorAll('a').forEach(function(a) {
        if (a.getAttribute('href').replace(/^\//,'').replace(/\/$/,'') === page) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
